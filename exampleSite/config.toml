baseURL = "https://example.org/"
languageCode = "zh-cn"
title = "My Beat Notes"
theme = "hugo-theme-beatai"

[taxonomies]
  tag = "tags"
  category = "categories"

[[menu.main]]
  name = "首页"
  pageRef = "/"
  weight = 1
  [menu.main.params]
    icon = "home"

[[menu.main]]
  name = "文档"
  pageRef = "/docs"
  weight = 2
  [menu.main.params]
    icon = "book-open"

[[menu.main]]
  name = "标签"
  pageRef = "/tags"
  weight = 3
  [menu.main.params]
    icon = "tag"

[[menu.main]]
  name = "搜索"
  pageRef = "/search"
  weight = 4
  [menu.main.params]
    icon = "search"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  description = "一个受 BeatAI 启发的 Hugo 文档站"
  tagline = "清晰、克制、适合长时间阅读"
  heroEyebrow = "Documentation Theme"
  heroCopy = "把 BeatAI 的阅读感、配色和信息结构迁移成一个可复用的 Hugo 主题。"
  primaryAction = "/docs/getting-started/"
  secondaryAction = "/tags/"
  github = "https://github.com/yourname/yourrepo"
  ShowReadingTime = true
  ShowWordCount = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowPostNavLinks = true
  ShowToc = true
  TocOpen = true

  [params.math]
    enable = true
    engine = "katex"

  [params.search]
    enable = true
    provider = "flexsearch"
    placeholder = "Search notes, guides, and docs"
    indexURL = "/index.json"
    limit = 8

[markup]
  [markup.goldmark]
    [markup.goldmark.extensions.passthrough]
      enable = true

      [markup.goldmark.extensions.passthrough.delimiters]
        block = [['$$','$$'], ['\\[','\\]']]
        inline = [['$','$'], ['\\(','\\)']]

  [markup.goldmark.renderer]
    unsafe = true
