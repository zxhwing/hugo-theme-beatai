{{ define "main" }}
  <section class="article">
    <header class="article-header">
      <p class="article-kicker">{{ .Data.Singular }}</p>
      <h1>{{ .Title }}</h1>
      <p class="article-description">与当前主题相关的内容。</p>
    </header>
    <div class="card-grid">
      {{ range .Pages }}
        <a class="doc-card" href="{{ .RelPermalink }}">
          <span class="doc-card-label">{{ .Section }}</span>
          <strong>{{ .Title }}</strong>
          <p>{{ .Params.description | default (.Summary | plainify | truncate 120) }}</p>
        </a>
      {{ end }}
    </div>
  </section>
{{ end }}
