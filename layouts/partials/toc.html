{{ $showToc := and .IsPage (.Param "ShowToc") (gt (len .TableOfContents) 0) }}
<aside class="page-toc{{ if not $showToc }} is-empty{{ end }}">
  {{ if $showToc }}
    <details class="page-toc-inner" {{ if .Param "TocOpen" }}open{{ end }}>
      <summary>On This Page</summary>
      {{ .TableOfContents }}
    </details>
  {{ end }}
</aside>
