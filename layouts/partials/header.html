<header class="topbar">
  <button class="nav-toggle" type="button" data-nav-toggle aria-label="Toggle navigation">☰</button>
  <a class="brand" href="{{ site.Home.RelPermalink }}">
    <span class="brand-mark"></span>
    <span>{{ site.Title }}</span>
  </a>
  <div class="topbar-actions">
    <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle theme">Theme</button>
    {{ with site.Params.github }}
      <a class="topbar-link" href="{{ . }}">GitHub</a>
    {{ end }}
  </div>
</header>
